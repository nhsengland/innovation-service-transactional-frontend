<div class="nhsuk-form-group" [ngClass]="{ 'nhsuk-form-group--error': hasError }">
  <legend *ngIf="label" class="nhsuk-fieldset__legend" [ngClass]="{ 'nhsuk-fieldset__legend--l': pageUniqueField }">
    <ng-container *ngIf="pageUniqueField">
      <h1 class="nhsuk-fieldset__heading">{{ label }}</h1>
    </ng-container>
    <ng-container *ngIf="!pageUniqueField"> {{ label }} </ng-container>
  </legend>

  <ng-container *ngIf="description">
    <div id="hint-{{ id }}" class="nhsuk-hint" [innerHTML]="description"></div>
  </ng-container>

  <ng-container *ngIf="hasError">
    <span id="error-{{ id }}" class="nhsuk-error-message" role="alert"> <span class="nhsuk-u-visually-hidden">Error:</span> {{ error.message | translate: error.params }} </span>
  </ng-container>

  <p *ngIf="evidencesList.length === 0">There are no evidences on this section.</p>
  <dl *ngIf="evidencesList.length > 0" class="nhsuk-summary-list">
    <div *ngFor="let item of evidencesList; index as i" class="nhsuk-summary-list__row">
      <dt class="nhsuk-summary-list__key">Evidence {{ i + 1 }}</dt>
      <dd class="nhsuk-summary-list__value text-pre-wrap">{{ item.name }}</dd>
      <dd class="nhsuk-summary-list__actions">
        <a routerLink="{{ baseUrl }}/evidences/{{ item.id }}" attr.aria-label="View {{ item.name }} details">More details</a>
      </dd>
    </div>
  </dl>

  <div class="nhsuk-action-link">
    <a routerLink="{{ baseUrl }}/evidences/new" class="nhsuk-action-link__link">
      <theme-svg-icon type="arrow-right-circle" />
      <span class="nhsuk-action-link__text">Add evidence</span>
    </a>
  </div>
</div>
